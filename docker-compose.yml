version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swarm_cluster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-network

  cluster:
    build:
      context: ./Cluster
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=swarm_cluster;Username=postgres;Password=postgres"
      Redis__Connection: "redis:6379"
      RabbitMQ__Hostname: "rabbitmq"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully # Run only after migrations complete
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - swarm-network
    volumes:
      - ./Cluster/logs:/app/logs

  node:
    build:
      context: ./Node
      dockerfile: Dockerfile
    environment:
      ClusterUrl: "http://cluster:5000"
      RabbitMQ__Hostname: "rabbitmq"
    depends_on:
      rabbitmq:
        condition: service_healthy
      cluster:
        condition: service_started
    networks:
      - swarm-network
    volumes:
      - ./Node/logs:/app/logs
    deploy:
      replicas: 1 # Start 1 node instance

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://cluster:5000/api"
    depends_on:
      - cluster
    networks:
      - swarm-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  swarm-network:
    driver: bridge
